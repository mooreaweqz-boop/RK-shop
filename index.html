<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REALKAO SHOP</title>
    <!-- เรียกใช้ Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- เรียกใช้ Font Prompt และ Itim -->
    <link href="https://fonts.googleapis.com/css2?family=Itim&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- เรียกใช้ Font Awesome สำหรับ Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        html, body {
            background-color: #000000 !important;
            color: #e5e5e5;
            margin: 0;
            padding: 0;
            font-family: 'Prompt', sans-serif;
            min-height: 100vh;
        }
        
        .font-cute {
            font-family: 'Itim', cursive;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* ⬛️ พื้นหลังตารางเลเซอร์ขยับได้ ⬛️ */
        .cyber-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100vw; height: 100vh;
            z-index: -1;
            background-color: #000000;
            background-image: 
                linear-gradient(rgba(239, 68, 68, 0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(239, 68, 68, 0.15) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridMove 4s linear infinite;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 40px 40px; }
        }

        /* 🔴 กล่องข้อความเรืองแสงด้านบน 🔴 */
        .glow-red-box {
            position: relative;
            overflow: hidden;
            border: 1px solid #ef4444; 
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.5);
            animation: pulseGlow 2s infinite alternate;
        }

        .glow-red-box::after {
            content: '';
            position: absolute;
            top: 0; left: -150%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(239, 68, 68, 0.6), transparent);
            transform: skewX(-25deg);
            animation: laserSwipe 3s infinite ease-in-out;
            z-index: 1;
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 8px rgba(239, 68, 68, 0.3); border-color: #991b1b; }
            100% { box-shadow: 0 0 20px rgba(239, 68, 68, 0.8); border-color: #ef4444; }
        }

        @keyframes laserSwipe {
            0% { left: -150%; }
            50% { left: 150%; }
            100% { left: 150%; }
        }

        .music-btn {
            animation: floatMusic 3s ease-in-out infinite;
        }
        @keyframes floatMusic {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }
    </style>
</head>
<body class="bg-black">

    <div class="cyber-bg"></div>

    <!-- Container หลัก -->
    <div class="max-w-md mx-auto bg-black/60 backdrop-blur-sm min-h-screen relative pb-24 shadow-[0_0_40px_rgba(239,68,68,0.15)] border-x border-red-900/50">

        <!-- 1. Header -->
        <header class="flex justify-between items-center px-4 py-4 sticky top-0 z-10 bg-black/90 backdrop-blur-lg border-b border-red-900/50">
            <button class="text-red-500 text-2xl border border-red-900/50 rounded-lg px-3 py-1 bg-red-950/30">
                <i class="fa-solid fa-bars"></i>
            </button>
            <div class="relative w-48">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-red-500/70">
                    <i class="fa-solid fa-magnifying-glass text-sm"></i>
                </span>
                <input type="text" placeholder="ค้นหาสินค้า..." class="w-full bg-[#111] border border-red-900/50 rounded-full py-1.5 pl-9 pr-3 text-sm text-gray-200 focus:outline-none focus:ring-1 focus:ring-red-500 transition">
            </div>
        </header>

        <!-- 2. ชื่อร้านค้าด้านบนสุด -->
        <section class="px-4 mt-4">
            <div class="glow-red-box rounded-2xl bg-[#0a0000] flex justify-center items-center py-8">
                <h1 class="text-4xl text-red-500 font-cute tracking-widest relative z-10" style="text-shadow: 0 0 15px rgba(239, 68, 68, 0.8);">
                    REALKAO SHOP
                </h1>
            </div>
        </section>

        <!-- 3. ส่วนแสดงรายละเอียดและเลือกซื้อสินค้า -->
        <main class="px-4 mt-6">
            <div class="bg-[#050505] border border-red-900/50 rounded-3xl p-3 shadow-[0_0_20px_rgba(239,68,68,0.15)]">
                
                <!-- สไลด์รูปภาพสินค้าใหญ่ชัดเจน -->
                <div class="relative rounded-2xl overflow-hidden border border-red-900/30">
                    <img src="https://images.weserv.nl/?url=cdn.discordapp.com/attachments/1528247158069792863/1528380417978138624/149C212E-F29E-4F42-98AB-9F4C1BB39C76.png" 
                         alt="Proxy-Realpooh" 
                         class="w-full h-auto object-cover">
                </div>

                <!-- รายละเอียดปุ่มแชร์โซเชียล -->
                <div class="flex items-center gap-3 mt-4 px-1 text-sm text-gray-400">
                    <span>แชร์ :</span>
                    <button class="text-[#1877F2] text-xl"><i class="fa-brands fa-facebook-messenger"></i></button>
                    <button class="text-[#1877F2] text-xl"><i class="fa-brands fa-facebook"></i></button>
                    <button class="text-[#06C755] text-xl"><i class="fa-brands fa-line"></i></button>
                    <button class="text-[#1DA1F2] text-xl"><i class="fa-brands fa-twitter"></i></button>
                    <button class="text-gray-400 text-base ml-1"><i class="fa-regular fa-copy"></i></button>
                </div>

                <div class="my-4 border-t border-red-900/30"></div>

                <!-- รายละเอียดแพ็กเกจ/จำนวนวันที่ต้องการซื้อ -->
                <div class="px-1">
                    <h2 class="text-xl font-semibold text-white mb-1">🛒 Proxy-Realpooh</h2>
                    <p class="text-xs text-red-500 mb-4 font-light"><i class="fa-solid fa-circle-info mr-1"></i>โปรดเลือกประเภทแพ็กเกจจำนวนวันที่ต้องการใช้งาน</p>
                    
                    <!-- รายการปุ่มตัวเลือกแพ็กเกจ (1 วัน - 30 วัน) -->
                    <div class="space-y-2.5">
                        <!-- ตัวเลือก 1 วัน (เปิดใช้งานเป็นค่าเริ่มต้น) -->
                        <button onclick="selectPackage(1, 10)" id="pkg-1" class="w-full flex justify-between items-center bg-red-950/40 border-2 border-red-600 text-white px-4 py-3.5 rounded-xl transition duration-200">
                            <span class="font-medium text-base"><i class="fa-regular fa-clock mr-2 text-red-400"></i>แพ็กเกจ 1 วัน</span>
                            <span class="text-red-400 font-bold text-lg">10 ฿</span>
                        </button>

                        <!-- ตัวเลือก 3 วัน -->
                        <button onclick="selectPackage(3, 25)" id="pkg-3" class="w-full flex justify-between items-center bg-[#111] border border-red-900/30 text-gray-300 px-4 py-3.5 rounded-xl hover:border-red-600/5 transition duration-200">
                            <span class="font-medium text-base"><i class="fa-regular fa-clock mr-2 text-gray-500"></i>แพ็กเกจ 3 วัน</span>
                            <span class="text-gray-400 font-bold text-lg">25 ฿</span>
                        </button>

                        <!-- ตัวเลือก 7 วัน -->
                        <button onclick="selectPackage(7, 65)" id="pkg-7" class="w-full flex justify-between items-center bg-[#111] border border-red-900/30 text-gray-300 px-4 py-3.5 rounded-xl hover:border-red-600/5 transition duration-200">
                            <span class="font-medium text-base"><i class="fa-regular fa-clock mr-2 text-gray-500"></i>แพ็กเกจ 7 วัน</span>
                            <span class="text-gray-400 font-bold text-lg">65 ฿</span>
                        </button>

                        <!-- ตัวเลือก 15 วัน -->
                        <button onclick="selectPackage(15, 100)" id="pkg-15" class="w-full flex justify-between items-center bg-[#111] border border-red-900/30 text-gray-300 px-4 py-3.5 rounded-xl hover:border-red-600/5 transition duration-200">
                            <span class="font-medium text-base"><i class="fa-regular fa-clock mr-2 text-gray-500"></i>แพ็กเกจ 15 วัน</span>
                            <span class="text-gray-400 font-bold text-lg">100 ฿</span>
                        </button>

                        <!-- ตัวเลือก 30 วัน -->
                        <button onclick="selectPackage(30, 150)" id="pkg-30" class="w-full flex justify-between items-center bg-[#111] border border-red-900/30 text-gray-300 px-4 py-3.5 rounded-xl hover:border-red-600/5 transition duration-200">
                            <span class="font-medium text-base"><i class="fa-regular fa-clock mr-2 text-gray-500"></i>แพ็กเกจ 30 วัน</span>
                            <span class="text-gray-400 font-bold text-lg">150 ฿</span>
                        </button>
                    </div>

                    <!-- แผงราคาสรุป และปุ่มกดสั่งซื้อสินค้า -->
                    <div class="mt-6 pt-4 border-t border-red-900/20 bg-gradient-to-b from-[#110505]/40 to-black/80 p-3 rounded-2xl">
                        <div class="text-center mb-4">
                            <p class="text-sm text-gray-400">ยอดชำระเงินทั้งหมด</p>
                            <h3 class="text-3xl font-bold text-white mt-1"><span id="total-price">10</span> <span class="text-xl text-red-500">฿</span></h3>
                        </div>

                        <button class="w-full bg-gradient-to-b from-[#ff3333] to-[#660000] text-white font-semibold text-xl py-3.5 rounded-2xl hover:brightness-110 active:scale-95 transform transition shadow-[0_4px_20px_rgba(239,68,68,0.4)] border border-red-500/40">
                            <i class="fa-solid fa-basket-shopping mr-2"></i> สั่งซื้อแพ็กเกจ (<span id="btn-day">1</span> วัน)
                        </button>

                        <p class="text-center text-gray-500 text-xs mt-3"><i class="fa-solid fa-box mr-1"></i>ระบบพร้อมจัดส่งสินค้าทันทีหลังชำระเงิน</p>
                    </div>

                </div>
            </div>
        </main>

        <!-- 4. ปุ่มลอยเพลง -->
        <button class="music-btn fixed bottom-24 right-4 bg-red-600 text-white w-12 h-12 rounded-full flex justify-center items-center shadow-[0_0_15px_rgba(239,68,68,0.7)] z-20">
            <i class="fa-solid fa-music"></i>
        </button>

    </div>

    <!-- 💡 ระบบสคริปต์สำหรับการเลือกกดเปลี่ยนวันและราคาอัตโนมัติ 💡 -->
    <script>
        let currentActive = 1;

        function selectPackage(day, price) {
            // ลบขอบแดงของปุ่มเก่าออกทั้งหมด
            const days = [1, 3, 7, 15, 30];
            days.forEach(d => {
                const btn = document.getElementById(`pkg-${d}`);
                if (btn) {
                    btn.className = "w-full flex justify-between items-center bg-[#111] border border-red-900/30 text-gray-300 px-4 py-3.5 rounded-xl hover:border-red-600/5 transition duration-200";
                    btn.querySelector('i').className = "fa-regular fa-clock mr-2 text-gray-500";
                    btn.querySelector('span:last-child').className = "text-gray-400 font-bold text-lg";
                }
            });

            // ใส่ไฮไลท์ขอบแดงปุ่มที่ถูกเลือก
            const activeBtn = document.getElementById(`pkg-${day}`);
            if (activeBtn) {
                activeBtn.className = "w-full flex justify-between items-center bg-red-950/40 border-2 border-red-600 text-white px-4 py-3.5 rounded-xl transition duration-200";
                activeBtn.querySelector('i').className = "fa-regular fa-clock mr-2 text-red-400";
                activeBtn.querySelector('span:last-child').className = "text-red-400 font-bold text-lg";
            }

            // แสดงยอดราคาสรุป และตัวเลขวันบนปุ่มสั่งซื้อ
            document.getElementById('total-price').innerText = price;
            document.getElementById('btn-day').innerText = day;
        }
    </script>

</body>
</html>
