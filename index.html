<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REALKAO SHOP</title>
    <!-- เรียกใช้ Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- เรียกใช้ Font Prompt และ Itim -->
    <link href="https://fonts.googleapis.com/css2?family=Itim&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- เรียกใช้ Font Awesome สำหรับ Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        html, body {
            background-color: #000000 !important;
            color: #e5e5e5;
            margin: 0;
            padding: 0;
            font-family: 'Prompt', sans-serif;
            min-height: 100vh;
        }
        
        .font-cute {
            font-family: 'Itim', cursive;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* ⬛️ พื้นหลังตารางเลเซอร์ขยับได้ ⬛️ */
        .cyber-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100vw; height: 100vh;
            z-index: -1;
            background-color: #000000;
            background-image: 
                linear-gradient(rgba(239, 68, 68, 0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(239, 68, 68, 0.15) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridMove 4s linear infinite;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 40px 40px; }
        }

        /* 🔴 กล่องข้อความเรืองแสงด้านบน 🔴 */
        .glow-red-box {
            position: relative;
            overflow: hidden;
            border: 1px solid #ef4444; 
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.5);
            animation: pulseGlow 2s infinite alternate;
        }

        .glow-red-box::after {
            content: '';
            position: absolute;
            top: 0; left: -150%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(239, 68, 68, 0.6), transparent);
            transform: skewX(-25deg);
            animation: laserSwipe 3s infinite ease-in-out;
            z-index: 1;
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 8px rgba(239, 68, 68, 0.3); border-color: #991b1b; }
            100% { box-shadow: 0 0 20px rgba(239, 68, 68, 0.8); border-color: #ef4444; }
        }

        @keyframes laserSwipe {
            0% { left: -150%; }
            50% { left: 150%; }
            100% { left: 150%; }
        }

        .music-btn {
            animation: floatMusic 3s ease-in-out infinite;
        }
        @keyframes floatMusic {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }
    </style>
</head>
<body class="bg-black">

    <div class="cyber-bg"></div>

    <!-- Container หลัก -->
    <div class="max-w-md mx-auto bg-black/60 backdrop-blur-sm min-h-screen relative pb-24 shadow-[0_0_40px_rgba(239,68,68,0.15)] border-x border-red-900/50">

        <!-- 1. Header (เมนู + ค้นหา) -->
        <header class="flex justify-between items-center px-4 py-4 sticky top-0 z-10 bg-black/90 backdrop-blur-lg border-b border-red-900/50">
            <button class="text-red-500 text-2xl border border-red-900/50 rounded-lg px-3 py-1 bg-red-950/30">
                <i class="fa-solid fa-bars"></i>
            </button>
            <div class="relative w-48">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-red-500/70">
                    <i class="fa-solid fa-magnifying-glass text-sm"></i>
                </span>
                <input type="text" placeholder="ค้นหาสินค้า..." class="w-full bg-[#111] border border-red-900/50 rounded-full py-1.5 pl-9 pr-3 text-sm text-gray-200 focus:outline-none focus:ring-1 focus:ring-red-500 transition">
            </div>
        </header>

        <!-- 2. Banner โลโก้ร้านค้า -->
        <section class="px-4 mt-4">
            <div class="glow-red-box rounded-2xl bg-[#0a0000] flex justify-center items-center py-10">
                <h1 class="text-4xl text-red-500 font-cute tracking-widest relative z-10" style="text-shadow: 0 0 15px rgba(239, 68, 68, 0.8);">
                    REALKAO SHOP
                </h1>
            </div>
        </section>

        <!-- 3. หมวดหมู่สินค้า -->
        <section class="px-4 mt-5 mb-2 flex gap-2 overflow-x-auto no-scrollbar py-1">
            <button class="whitespace-nowrap bg-red-950/50 border border-red-900/80 text-red-400 px-4 py-1.5 rounded-xl text-sm font-medium shadow-[0_0_10px_rgba(239,68,68,0.2)]">ประกาศ</button>
            <button class="whitespace-nowrap bg-black/50 border border-red-900/40 text-red-500/80 px-4 py-1.5 rounded-xl text-sm font-medium hover:bg-red-950/30">ประกาศ</button>
            <button class="whitespace-nowrap bg-black/50 border border-red-900/40 text-red-500/80 px-4 py-1.5 rounded-xl text-sm font-medium hover:bg-red-950/30">ประกาศ</button>
        </section>
        
        <div class="px-4 mt-2"><hr class="border-red-900/30"></div>

        <!-- 4. หน้าแรก: รายการสินค้า -->
        <section class="px-4 mt-6">
            <div class="bg-[#080808] border-[3px] border-gray-200 rounded-[35px] p-2 relative shadow-[0_0_25px_rgba(239,68,68,0.25)]">
                
                <!-- อัปเดตเป็นรูปสินค้าด้วยลิงก์ตรง Discord -->
                <img src="https://cdn.discordapp.com/attachments/1528247158069792863/1528428235589947452/IMG_6265.png?ex=6a5e4338&is=6a5cf1b8&hm=5611de09f7148eab1dd740c3226c6965f84f722b9ac20fcf498ddcd809069a9e&" 
                     alt="Proxy-Realpooh Product" 
                     class="w-full rounded-[28px] object-cover border border-red-900/30">
                
                <!-- รายละเอียดการ์ด -->
                <div class="px-3 py-4 relative z-10">
                    <div class="flex items-center gap-2 mb-2 pl-1">
                        <span class="text-white text-2xl leading-none">•</span>
                        <span class="text-xl">🛒</span>
                        <h3 class="text-white text-2xl font-semibold tracking-wide">Proxy-Realpooh</h3>
                    </div>
                    
                    <div class="text-center mt-3 mb-5">
                        <span class="text-[#ff9999] text-xl font-medium">เริ่มต้น</span>
                        <span class="text-white text-[32px] font-bold mx-3">10</span>
                        <span class="text-gray-300 text-xl font-medium">฿</span>
                    </div>
                    
                    <button onclick="openOrderModal()" class="w-full bg-gradient-to-b from-[#ff3333] to-[#550000] text-white font-semibold text-2xl py-3.5 rounded-3xl hover:scale-[1.02] transform transition shadow-[0_5px_20px_rgba(239,68,68,0.5)] mb-5 border border-red-500/50">
                        สั่งซื้อสินค้า
                    </button>
                    
                    <div class="flex justify-center items-center gap-2 text-white text-[1.35rem] font-medium pb-2">
                        <i class="fa-solid fa-box-archive text-gray-300"></i>
                        <span>คงเหลือ 41 ชิ้น</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- 5. หน้าต่างป๊อปอัปเลือกวัน (Modal) -->
        <div id="orderModal" class="hidden fixed inset-0 z-50 flex items-end justify-center bg-black/80 backdrop-blur-sm p-4">
            <div class="bg-[#050505] border border-red-500/40 rounded-3xl w-full max-w-md p-4 shadow-[0_0_30px_rgba(239,68,68,0.4)] overflow-y-auto max-h-[95vh] no-scrollbar">
                
                <!-- หัวข้อป๊อปอัป + ปุ่มปิด -->
                <div class="flex justify-between items-center mb-4 border-b border-red-900/30 pb-2">
                    <h2 class="text-xl font-bold text-white flex items-center gap-2">🛒 สั่งซื้อ Proxy-Realpooh</h2>
                    <button onclick="closeOrderModal()" class="text-gray-400 hover:text-red-500 text-2xl px-2"><i class="fa-solid fa-xmark"></i></button>
                </div>

                <!-- รูปสินค้าขนาดเล็กในป๊อปอัป (ลิงก์ตรง Discord) -->
                <div class="mb-4 rounded-xl overflow-hidden border border-red-900/30">
                    <img src="https://cdn.discordapp.com/attachments/1528247158069792863/1528428235589947452/IMG_6265.png?ex=6a5e4338&is=6a5cf1b8&hm=5611de09f7148eab1dd740c3226c6965f84f722b9ac20fcf498ddcd809069a9e&" 
                         alt="Product Mini" 
                         class="w-full h-32 object-cover">
                </div>

                <!-- เลือกวัน -->
                <p class="text-xs text-red-500 mb-3 font-light"><i class="fa-solid fa-circle-info mr-1"></i>โปรดเลือกประเภทแพ็กเกจจำนวนวันที่ต้องการใช้งาน</p>
                
                <div class="space-y-2">
                    <!-- 1 วัน -->
                    <button onclick="selectPackage(1, 10)" id="pkg-1" class="w-full flex justify-between items-center bg-red-950/40 border-2 border-red-600 text-white px-4 py-3 rounded-xl transition">
                        <span class="font-medium text-sm"><i class="fa-regular fa-clock mr-2 text-red-400"></i>แพ็กเกจ 1 วัน</span>
                        <span class="text-red-400 font-bold text-base">10 ฿</span>
                    </button>
                    <!-- 3 วัน -->
                    <button onclick="selectPackage(3, 25)" id="pkg-3" class="w-full flex justify-between items-center bg-[#111] border border-red-900/30 text-gray-300 px-4 py-3 rounded-xl transition">
                        <span class="font-medium text-sm"><i class="fa-regular fa-clock mr-2 text-gray-500"></i>แพ็กเกจ 3 วัน</span>
                        <span class="text-gray-400 font-bold text-base">25 ฿</span>
                    </button>
                    <!-- 7 วัน -->
                    <button onclick="selectPackage(7, 65)" id="pkg-7" class="w-full flex justify-between items-center bg-[#111] border border-red-900/30 text-gray-300 px-4 py-3 rounded-xl transition">
                        <span class="font-medium text-sm"><i class="fa-regular fa-clock mr-2 text-gray-500"></i>แพ็กเกจ 7 วัน</span>
                        <span class="text-gray-400 font-bold text-base">65 ฿</span>
                    </button>
                    <!-- 15 วัน -->
                    <button onclick="selectPackage(15, 100)" id="pkg-15" class="w-full flex justify-between items-center bg-[#111] border border-red-900/30 text-gray-300 px-4 py-3 rounded-xl transition">
                        <span class="font-medium text-sm"><i class="fa-regular fa-clock mr-2 text-gray-500"></i>แพ็กเกจ 15 วัน</span>
                        <span class="text-gray-400 font-bold text-base">100 ฿</span>
                    </button>
                    <!-- 30 วัน -->
                    <button onclick="selectPackage(30, 150)" id="pkg-30" class="w-full flex justify-between items-center bg-[#111] border border-red-900/30 text-gray-300 px-4 py-3 rounded-xl transition">
                        <span class="font-medium text-sm"><i class="fa-regular fa-clock mr-2 text-gray-500"></i>แพ็กเกจ 30 วัน</span>
                        <span class="text-gray-400 font-bold text-base">150 ฿</span>
                    </button>
                </div>

                <!-- สรุปและยืนยันการสั่งซื้อ -->
                <div class="mt-5 pt-3 border-t border-red-900/20 bg-gradient-to-b from-[#110505]/40 to-black p-3 rounded-xl">
                    <div class="text-center mb-3">
                        <p class="text-xs text-gray-400">ยอดชำระเงินทั้งหมด</p>
                        <h3 class="text-2xl font-bold text-white mt-0.5"><span id="total-price">10</span> <span class="text-lg text-red-500">฿</span></h3>
                    </div>

                    <button class="w-full bg-gradient-to-b from-[#ff3333] to-[#660000] text-white font-semibold text-lg py-3 rounded-xl shadow-[0_4px_15px_rgba(239,68,68,0.4)] border border-red-500/40">
                        ยืนยันสั่งซื้อ (<span id="btn-day">1</span> วัน)
                    </button>
                </div>

            </div>
        </div>

        <!-- ปุ่มลอยเพลง -->
        <button class="music-btn fixed bottom-24 right-4 bg-red-600 text-white w-12 h-12 rounded-full flex justify-center items-center shadow-[0_0_15px_rgba(239,68,68,0.7)] z-20">
            <i class="fa-solid fa-music"></i>
        </button>

    </div>

    <!-- สคริปต์ระบบเปิดปิด และเปลี่ยนวันราคา -->
    <script>
        function openOrderModal() {
            document.getElementById('orderModal').classList.remove('hidden');
        }

        function closeOrderModal() {
            document.getElementById('orderModal').classList.add('hidden');
        }

        function selectPackage(day, price) {
            const days = [1, 3, 7, 15, 30];
            days.forEach(d => {
                const btn = document.getElementById(`pkg-${d}`);
                if (btn) {
                    btn.className = "w-full flex justify-between items-center bg-[#111] border border-red-900/30 text-gray-300 px-4 py-3 rounded-xl transition";
                    btn.querySelector('i').className = "fa-regular fa-clock mr-2 text-gray-500";
                    btn.querySelector('span:last-child').className = "text-gray-400 font-bold text-base";
                }
            });

            const activeBtn = document.getElementById(`pkg-${day}`);
            if (activeBtn) {
                activeBtn.className = "w-full flex justify-between items-center bg-red-950/40 border-2 border-red-600 text-white px-4 py-3 rounded-xl transition";
                activeBtn.querySelector('i').className = "fa-regular fa-clock mr-2 text-red-400";
                activeBtn.querySelector('span:last-child').className = "text-red-400 font-bold text-base";
            }

            document.getElementById('total-price').innerText = price;
            document.getElementById('btn-day').innerText = day;
        }
    </script>

</body>
</html>
