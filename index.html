<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REALKAO SHOP</title>
    <!-- เรียกใช้ Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- เรียกใช้ Font Prompt (ฟอนต์หลัก) และ Itim (ฟอนต์น่ารักๆ สำหรับโลโก้) -->
    <link href="https://fonts.googleapis.com/css2?family=Itim&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- เรียกใช้ Font Awesome สำหรับ Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* บังคับพื้นหลังให้เป็นสีดำสนิท 100% */
        html, body {
            background-color: #000000 !important;
            color: #e5e5e5;
            margin: 0;
            padding: 0;
            font-family: 'Prompt', sans-serif;
            min-height: 100vh;
        }
        
        /* ตั้งค่าฟอนต์น่ารัก */
        .font-cute {
            font-family: 'Itim', cursive;
        }

        /* ซ่อน Scrollbar */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* ⬛️ พื้นหลังสีดำตะแกรงเลเซอร์ขยับได้ (Cyberpunk Grid) ⬛️ */
        .cyber-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100vw; height: 100vh;
            z-index: -1;
            background-color: #000000;
            background-image: 
                linear-gradient(rgba(239, 68, 68, 0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(239, 68, 68, 0.15) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridMove 4s linear infinite;
        }

        /* เงาดำมืดๆ ขอบจอให้ตรงกลางดูสว่าง */
        .cyber-bg::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 50% 50%, transparent 10%, #000000 90%);
            z-index: 0;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 40px 40px; }
        }

        /* 🔴 โหมดเอฟเฟกต์ขยับได้แบบโหดๆ สำหรับแบนเนอร์บนสุด 🔴 */
        .glow-red-box {
            position: relative;
            overflow: hidden;
            border: 1px solid #ef4444; 
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.5);
            animation: pulseGlow 2s infinite alternate;
        }

        .glow-red-box::after {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(239, 68, 68, 0.6), transparent);
            transform: skewX(-25deg);
            animation: laserSwipe 3s infinite ease-in-out;
            z-index: 1; /* ให้แสงเลเซอร์อยู่หลังตัวหนังสือ */
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 8px rgba(239, 68, 68, 0.3); border-color: #991b1b; }
            100% { box-shadow: 0 0 20px rgba(239, 68, 68, 0.8), inset 0 0 10px rgba(239, 68, 68, 0.3); border-color: #ef4444; }
        }

        @keyframes laserSwipe {
            0% { left: -150%; }
            50% { left: 150%; }
            100% { left: 150%; }
        }

        /* Animation ให้ปุ่มเพลงลอยได้ */
        @keyframes floatMusic {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }
        .music-btn {
            animation: floatMusic 3s ease-in-out infinite;
        }
    </style>
</head>
<body class="bg-black">

    <!-- 🌟 เรียกใช้พื้นหลังขยับได้ 🌟 -->
    <div class="cyber-bg"></div>

    <!-- Container หลัก -->
    <div class="max-w-md mx-auto bg-black/60 backdrop-blur-sm min-h-screen relative pb-24 shadow-[0_0_40px_rgba(239,68,68,0.15)] border-x border-red-900/50">

        <!-- 1. Header (เมนู + ค้นหา ธีมดาร์ก) -->
        <header class="flex justify-between items-center px-4 py-4 sticky top-0 z-10 bg-black/90 backdrop-blur-lg border-b border-red-900/50">
            <button class="text-red-500 text-2xl border border-red-900/50 rounded-lg px-3 py-1 bg-red-950/30 hover:bg-red-900/50 transition">
                <i class="fa-solid fa-bars"></i>
            </button>
            <div class="relative w-48">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-red-500/70">
                    <i class="fa-solid fa-magnifying-glass text-sm"></i>
                </span>
                <input type="text" placeholder="ค้นหาสินค้า..." class="w-full bg-[#111] border border-red-900/50 rounded-full py-1.5 pl-9 pr-3 text-sm text-gray-200 placeholder-gray-500 focus:outline-none focus:ring-1 focus:ring-red-500 focus:border-red-500 transition">
            </div>
        </header>

        <!-- 2. Banner หลักด้านบนสุด (ข้อความฟอนต์น่ารัก) -->
        <section class="px-4 mt-4">
            <div class="glow-red-box rounded-2xl bg-[#0a0000] flex justify-center items-center py-12">
                <h1 class="text-4xl md:text-5xl text-red-500 font-cute tracking-widest relative z-10" style="text-shadow: 0 0 15px rgba(239, 68, 68, 0.8), 0 0 5px rgba(255, 255, 255, 0.3);">
                    REALKAO SHOP
                </h1>
            </div>
        </section>

        <!-- 3. หมวดหมู่ (ประกาศ ธีมดาร์ก-แดง) -->
        <section class="px-4 mt-5 mb-2 flex gap-2 overflow-x-auto no-scrollbar py-1">
            <button class="whitespace-nowrap bg-red-950/50 border border-red-900/80 text-red-400 px-4 py-1.5 rounded-xl text-sm font-medium shadow-[0_0_10px_rgba(239,68,68,0.2)]">ประกาศ</button>
            <button class="whitespace-nowrap bg-black/50 border border-red-900/40 text-red-500/80 px-4 py-1.5 rounded-xl text-sm font-medium hover:bg-red-950/30">ประกาศ</button>
            <button class="whitespace-nowrap bg-black/50 border border-red-900/40 text-red-500/80 px-4 py-1.5 rounded-xl text-sm font-medium hover:bg-red-950/30">ประกาศ</button>
        </section>
        
        <div class="px-4 mt-2"><hr class="border-red-900/30"></div>

        <!-- 4. รายการสินค้า -->
        <section class="px-4 mt-6">
            <!-- กล่องการ์ดสินค้า -->
            <div class="bg-[#080808] border-[3px] border-gray-200 rounded-[35px] p-2 relative shadow-[0_0_25px_rgba(239,68,68,0.25)]">
                
                <!-- รูปสินค้า -->
                <img src="https://images.weserv.nl/?url=cdn.discordapp.com/attachments/1528247158069792863/1528380417978138624/149C212E-F29E-4F42-98AB-9F4C1BB39C76.png" 
                     alt="Product" 
                     class="w-full rounded-[28px] object-cover border border-red-900/30">
                
                <!-- ส่วนรายละเอียดด้านล่าง -->
                <div class="px-3 py-4 relative z-10">
                    
                    <!-- ชื่อสินค้า -->
                    <div class="flex items-center gap-2 mb-2 pl-1">
                        <span class="text-white text-2xl leading-none">•</span>
                        <span class="text-xl">🛒</span>
                        <h3 class="text-white text-2xl font-semibold tracking-wide">Proxy-Realpooh</h3>
                    </div>
                    
                    <!-- ราคา -->
                    <div class="text-center mt-3 mb-5">
                        <span class="text-[#ff9999] text-xl font-medium">เริ่มต้น</span>
                        <span class="text-white text-[32px] font-bold mx-3">10</span>
                        <span class="text-gray-300 text-xl font-medium">฿</span>
                    </div>
                    
                    <!-- ปุ่มสั่งซื้อสินค้า -->
                    <button class="w-full bg-gradient-to-b from-[#ff3333] to-[#550000] text-white font-semibold text-2xl py-3.5 rounded-3xl hover:scale-[1.02] transform transition shadow-[0_5px_20px_rgba(239,68,68,0.5)] mb-5 border border-red-500/50">
                        สั่งซื้อสินค้า
                    </button>
                    
                    <!-- สต็อกสินค้า -->
                    <div class="flex justify-center items-center gap-2 text-white text-[1.35rem] font-medium pb-2">
                        <i class="fa-solid fa-box-archive text-gray-300"></i>
                        <span>คงเหลือ 41 ชิ้น</span>
                    </div>

                </div>
            </div>
        </section>

        <!-- 5. ปุ่มลอย (Music Button) -->
        <button class="music-btn fixed bottom-24 right-4 bg-red-600 text-white w-12 h-12 rounded-full flex justify-center items-center shadow-[0_0_15px_rgba(239,68,68,0.7)] transform transition hover:scale-110 active:scale-95 z-20">
            <i class="fa-solid fa-music"></i>
        </button>

    </div>

</body>
</html>
